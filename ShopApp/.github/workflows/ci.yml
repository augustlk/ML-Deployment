name: CI — Build, Test & Docker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ShopApp.sln

      - name: Build
        run: dotnet build ShopApp.sln --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test tests/ShopApp.Tests/ShopApp.Tests.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shopapp:latest .

      # Uncomment and configure for your registry (GHCR, Docker Hub, etc.)
